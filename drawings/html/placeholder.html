<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Caveat+Brush&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Caveat Brush', cursive;
  }

  .title {
    font-size: 28px;
    color: #f5f0e8;
    margin-bottom: 20px;
    opacity: 0.8;
  }

  .paper {
    position: relative;
    width: 700px;
    height: 700px;
    background: #f5f0e8;
    border-radius: 4px;
  }

  .paper::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 50%, rgba(0,0,0,0.04) 100%);
    pointer-events: none;
    border-radius: 4px;
  }

  canvas {
    width: 100%;
    height: 100%;
    border-radius: 4px;
  }
</style>
</head>
<body>

<div class="paper">
  <canvas id="canvas" width="700" height="700"></canvas>
</div>

<script>
const ctx = document.getElementById('canvas').getContext('2d');
ctx.lineCap = 'round';
ctx.lineJoin = 'round';
ctx.scale(1.4, 1.4);

ctx.strokeStyle = '#482121';
ctx.fillStyle = '#482121';
ctx.lineWidth = 3.5;
ctx.beginPath();
ctx.moveTo(3, 8);
ctx.quadraticCurveTo(11, 8, 11, 10);
ctx.fill();
</script>
</body>
</html>
